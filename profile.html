<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | AI Pulse</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm py-3 border-bottom border-secondary">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3 text-primary ai-font" href="index.html">AI Pulse<span class="text-light">_</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link fw-medium px-3" href="index.html">Latest News</a></li>
            </ul>
            <div class="d-flex align-items-center ms-lg-4 mt-3 mt-lg-0">
                <div id="auth-link-container"></div>
            </div>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div id="profile-loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 text-muted">Accessing profile records...</p>
    </div>

    <div id="profile-content" class="row gx-lg-5 d-none">
        <!-- Profile Sidebar -->
        <div class="col-lg-4 mb-5">
            <div class="card border-0 shadow-sm rounded-4 widget-card">
                <div class="card-body p-4 text-center">
                    <h3 class="fw-bold ai-font mb-1" id="profile-name">Loading...</h3>
                    <p class="text-muted small mb-3" id="profile-role">Node Operator</p>
                    <p class="text-light mb-4" id="profile-about">No bio provided.</p>
                    
                    <div class="d-flex justify-content-center gap-3 mb-4" id="profile-socials">
                        <!-- Socials injected here -->
                    </div>

                    <div id="follow-btn-container" class="d-none mt-3">
                        <button id="follow-btn" class="btn btn-outline-info rounded-pill w-100"><i class="bi bi-person-plus me-1"></i> Follow</button>
                    </div>

                    <div id="edit-profile-btn-container" class="d-none mt-3">
                        <button class="btn btn-outline-primary rounded-pill w-100" data-bs-toggle="modal" data-bs-target="#editProfileModal">
                            <i class="bi bi-gear me-2"></i>Edit Profile
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- User Comments -->
        <div class="col-lg-8">
            <h4 class="ai-font fw-bold mb-4"><i class="bi bi-chat-quote text-primary me-2"></i>Transmission Logs</h4>
            <div id="user-comments-list" class="d-flex flex-column gap-3">
                <!-- Comments injected here -->
            </div>
        </div>
    </div>
</div>

<!-- Edit Profile Modal -->
<div class="modal fade" id="editProfileModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark border-secondary rounded-4">
      <div class="modal-header border-secondary">
        <h5 class="modal-title ai-font text-primary"><i class="bi bi-sliders me-2"></i>Profile Settings</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="edit-profile-form">
            <div class="mb-3">
                <label class="form-label text-muted small">Display Name</label>
                <input type="text" id="edit-name" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small">About / Bio</label>
                <textarea id="edit-about" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small"><i class="bi bi-twitter-x me-1"></i>Twitter URL</label>
                <input type="url" id="edit-twitter" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small"><i class="bi bi-github me-1"></i>GitHub URL</label>
                <input type="url" id="edit-github" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none">
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small"><i class="bi bi-linkedin me-1"></i>LinkedIn URL</label>
                <input type="url" id="edit-linkedin" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none">
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill">Save Profile Changes</button>
        </form>

        <hr class="border-secondary my-4">

        <h6 class="text-danger mb-3"><i class="bi bi-shield-lock me-2"></i>Security</h6>
        <form id="update-password-form">
            <div class="mb-3">
                <label class="form-label text-muted small">New Password</label>
                <input type="password" id="new-password" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none" required minlength="6">
            </div>
            <button type="submit" class="btn btn-outline-danger w-100 rounded-pill">Update Password</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="profile.js"></script>
</body>
</html>
