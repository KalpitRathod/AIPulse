<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | AI Pulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm py-3 border-bottom border-secondary">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3 text-primary ai-font" href="index.html">AI Pulse<span class="text-light">_</span></a>
        <div class="ms-auto d-flex align-items-center">
            <span class="me-3 text-muted small d-none d-md-inline" id="user-email"></span>
            <button id="logout-btn" class="btn btn-outline-danger rounded-pill px-4 shadow-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h2 class="ai-font fw-bold mb-4">Command Center</h2>
    
    <div class="row gx-lg-5">
        <div class="col-lg-4 mb-5">
            <div class="card border-0 shadow-sm rounded-4 widget-card h-100">
                <div class="card-body p-4">
                    <h5 id="form-title" class="card-title fw-bold ai-font mb-4 text-primary"><i class="bi bi-pencil-square me-2"></i>Create Transmission</h5>
                    <form id="create-post-form">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Title</label>
                            <input type="text" id="post-title" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Category</label>
                            <select id="post-category" class="form-select rounded-3 bg-dark border-secondary text-light shadow-none">
                                <option value="LLMs & Chatbots">LLMs & Chatbots</option>
                                <option value="Generative Art">Generative Art</option>
                                <option value="AI Hardware">AI Hardware</option>
                                <option value="AI Ethics">AI Ethics</option>
                                <option value="Developer Tools">Developer Tools</option>
                                <option value="Startups">Startups</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Image URL</label>
                            <input type="url" id="post-image" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none" placeholder="https://unsplash.com/...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Excerpt</label>
                            <textarea id="post-excerpt" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none" rows="2" required></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small">Full Content (HTML tags supported)</label>
                            <textarea id="post-content" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none" rows="6" required></textarea>
                        </div>
                        <div class="form-check mb-4">
                            <input class="form-check-input bg-dark border-secondary shadow-none" type="checkbox" id="post-featured">
                            <label class="form-check-label text-light small" for="post-featured">
                                Set as Featured (Hero Section)
                            </label>
                        </div>
                        <input type="hidden" id="post-id" value="">
                        <div class="d-flex gap-2">
                            <button type="submit" id="submit-post-btn" class="btn btn-primary w-100 rounded-pill fw-medium">Publish to Network</button>
                            <button type="button" id="cancel-edit-btn" class="btn btn-outline-secondary w-50 rounded-pill d-none">Cancel</button>
                        </div>
                    </form>
                    <div id="post-msg" class="mt-3 text-success small d-none text-center bg-dark p-2 rounded-3">Published successfully.</div>
                </div>
            </div>
        </div>
        
        <div class="col-lg-8 mb-5">
            <div class="card border-0 shadow-sm rounded-4 widget-card h-100">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold ai-font mb-4 text-primary"><i class="bi bi-server me-2"></i>Manage Transmissions</h5>
                    <div class="table-responsive">
                        <table class="table table-dark table-hover align-middle border-secondary m-0">
                            <thead>
                                <tr>
                                    <th class="border-secondary text-muted fw-normal">Title</th>
                                    <th class="border-secondary text-muted fw-normal">Date</th>
                                    <th class="border-secondary text-muted fw-normal">Category</th>
                                    <th class="border-secondary text-muted fw-normal">Featured</th>
                                    <th class="border-secondary text-muted fw-normal">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-posts-table">
                                <!-- Posts injected here -->
                                <tr><td colspan="5" class="text-center text-muted py-4">Initializing database fetch...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row gx-lg-5">
        <div class="col-lg-6 mb-5">
            <div class="card border-0 shadow-sm rounded-4 widget-card h-100">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold ai-font mb-4 text-warning"><i class="bi bi-key me-2"></i>Credential Requests</h5>
                    <ul class="list-group list-group-flush bg-transparent" id="admin-password-requests">
                        <li class="list-group-item bg-transparent text-muted px-0 border-0">Loading requests...</li>
                    </ul>
                </div>
            </div>
        </div>
        
        <div class="col-lg-6 mb-5">
            <div class="card border-0 shadow-sm rounded-4 widget-card h-100">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold ai-font mb-4 text-info"><i class="bi bi-link-45deg me-2"></i>Footer Configuration</h5>
                    <form id="settings-form">
                        <div class="mb-3">
                            <label class="form-label text-muted small"><i class="bi bi-twitter-x me-1"></i> Twitter / X URL</label>
                            <input type="url" id="setting-twitter" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small"><i class="bi bi-github me-1"></i> GitHub URL</label>
                            <input type="url" id="setting-github" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small"><i class="bi bi-discord me-1"></i> Discord URL</label>
                            <input type="url" id="setting-discord" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none">
                        </div>
                        <button type="submit" class="btn btn-info w-100 rounded-pill fw-medium text-dark">Save Links</button>
                    </form>
                    <div id="settings-msg" class="mt-3 text-success small d-none text-center bg-dark p-2 rounded-3">Links updated globally.</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="admin.js"></script>
</body>
</html>
