<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="meta-title">Article | AI Pulse</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" id="meta-desc" content="Read the latest analysis on Artificial Intelligence at AI Pulse.">
    <!-- Open Graph -->
    <meta property="og:type" content="article">
    <meta property="og:title" id="og-title" content="Article | AI Pulse">
    <meta property="og:description" id="og-desc" content="Read the latest analysis on Artificial Intelligence at AI Pulse.">
    <meta property="og:image" id="og-image" content="https://images.unsplash.com/photo-1677442136019-21780ecad995?w=1200">
    <meta name="twitter:card" content="summary_large_image">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm py-3 border-bottom border-secondary">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3 text-primary ai-font" href="index.html">AI Pulse<span class="text-light">_</span></a>
        <div class="ms-auto d-flex align-items-center" id="auth-link-container">
            <!-- Auth buttons injected by supabase-client.js -->
            <a href="login.html" class="btn btn-primary rounded-pill px-4 shadow-sm">Login</a>
        </div>
    </div>
</nav>

<div class="container py-5 mt-4" style="max-width: 800px; word-wrap: break-word;">
    <div id="post-loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="text-muted mt-3">Decrypting article data...</p>
    </div>
    
    <div id="post-content-container" class="d-none">
        <div class="mb-4 d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div>
                <span id="post-category" class="badge bg-primary me-2 px-3 py-2"></span>
                <span id="post-date" class="text-muted small"><i class="bi bi-calendar3 me-1"></i> </span>
            </div>
            <button id="like-btn" class="btn btn-outline-danger rounded-pill px-3 shadow-sm d-flex align-items-center gap-2">
                <i class="bi bi-heart"></i> <span id="like-count">0</span>
            </button>
        </div>
        
        <h1 id="post-title" class="display-4 fw-bolder mb-4 ai-font text-break"></h1>
        <img id="post-image" src="" class="img-fluid rounded-4 shadow-lg mb-5 w-100 border border-secondary" style="object-fit: cover; max-height: 450px;" alt="Article header image">
        
        <div id="post-body" class="fs-5 lh-lg text-light mb-5 text-break" style="font-family: 'Inter', sans-serif;">
            <!-- Content injected here -->
        </div>
        
        <hr class="my-5 border-secondary">
        
        <!-- Comments Section -->
        <h3 class="ai-font fw-bold mb-4 text-primary"><i class="bi bi-chat-text me-2"></i>Discussion (<span id="comment-count">0</span>)</h3>
        
        <div id="comment-form-container" class="mb-5">
            <form id="comment-form" class="card border-0 bg-dark p-3 rounded-4 shadow-sm widget-card">
                <textarea id="comment-input" class="form-control bg-transparent border-secondary text-light shadow-none mb-3" rows="3" placeholder="Add your perspective to the discussion..." required></textarea>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-medium">Transmit Comment</button>
                </div>
            </form>
            <div id="login-to-comment" class="alert alert-secondary border-secondary bg-dark text-light rounded-4 text-center d-none py-4">
                <i class="bi bi-lock fs-4 d-block mb-2 text-muted"></i>
                <a href="login.html" class="text-primary text-decoration-none fw-bold">Authenticate</a> to join the discussion.
            </div>
        </div>
        
        <div id="comments-list" class="d-flex flex-column gap-3">
            <!-- Comments injected here -->
        </div>
    </div>
</div>

<footer class="py-5 bg-dark mt-5 text-white border-top border-secondary">
    <div class="container px-4 px-lg-5">
        <div class="row align-items-center">
            <div class="col-lg-4 text-lg-start text-center mb-4 mb-lg-0">
                <a class="navbar-brand fw-bold fs-3 text-white text-decoration-none ai-font" href="index.html">AI Pulse<span class="text-primary">_</span></a>
                <p class="text-white-50 mt-2 mb-0" style="word-wrap: break-word;">Decoding the future of artificial intelligence, one token at a time.</p>
            </div>
            <div class="col-lg-4 text-center mb-4 mb-lg-0">
                <!-- Footer Links Dynamic IDs -->
                <a href="#" id="footer-link-twitter" class="btn btn-outline-light rounded-circle me-2 icon-btn"><i class="bi bi-twitter-x"></i></a>
                <a href="#" id="footer-link-github" class="btn btn-outline-light rounded-circle me-2 icon-btn"><i class="bi bi-github"></i></a>
                <a href="#" id="footer-link-discord" class="btn btn-outline-light rounded-circle me-2 icon-btn"><i class="bi bi-discord"></i></a>
            </div>
            <div class="col-lg-4 text-lg-end text-center text-white-50">
                <p class="m-0">&copy; <span id="current-year"></span> AI Pulse Network.</p>
            </div>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="post.js"></script>
</body>
</html>
