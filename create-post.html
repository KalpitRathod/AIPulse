<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Transmission | AI Pulse</title>
    <meta name="description" content="Submit a new transmission, research paper, or implementation detail to the AI Pulse community.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm py-3 border-bottom border-secondary">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3 text-primary ai-font" href="index.html">AI Pulse<span class="text-light">_</span></a>
        <div class="ms-auto d-flex align-items-center">
            <a href="profile.html" class="btn btn-outline-light rounded-pill px-4 shadow-sm">My Profile</a>
        </div>
    </div>
</nav>

<main class="container py-5" style="max-width: 800px;">
    <h2 class="ai-font fw-bold mb-4 text-center">Share Your Implementation</h2>
    <p class="text-muted text-center mb-5">Contribute to the AI Pulse community by sharing your code, architectures, and findings.</p>
    
    <div class="card border-0 shadow-sm rounded-4 widget-card">
        <div class="card-body p-4">
            <form id="create-post-form">
                <div class="mb-3">
                    <label class="form-label text-muted small">Title</label>
                    <input type="text" id="post-title" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small">Category</label>
                    <select id="post-category" class="form-select rounded-3 bg-dark border-secondary text-light shadow-none">
                        <option value="Community Implementation">Community Implementation</option>
                        <option value="Research Paper">Research Paper</option>
                        <option value="Hardware & Setup">Hardware & Setup</option>
                        <option value="Discussion">Discussion</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small">Image URL (Optional)</label>
                    <input type="url" id="post-image" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none" placeholder="https://unsplash.com/...">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small">Short Summary</label>
                    <textarea id="post-excerpt" class="form-control rounded-3 bg-dark border-secondary text-light shadow-none" rows="2" required></textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small">Full Details</label>
                    <div id="editor-container" class="bg-dark text-light border-secondary rounded-3" style="height: 300px; font-family: 'Inter', sans-serif;"></div>
                </div>
                <button type="submit" id="submit-post-btn" class="btn btn-primary w-100 rounded-pill fw-medium">Broadcast to Community</button>
            </form>
            <div id="post-msg" class="mt-3 text-success small d-none text-center bg-dark p-2 rounded-3">Successfully broadcasted to the community feed.</div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="create-post.js"></script>
</body>
</html>
